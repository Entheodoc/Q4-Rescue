name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: q4_rescue_test
          POSTGRES_USER: q4_rescue
          POSTGRES_PASSWORD: q4_rescue_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U q4_rescue -d q4_rescue_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests
        env:
          Q4_RESCUE_ENV: test
          Q4_RESCUE_AUTH_ENABLED: "true"
          Q4_RESCUE_TEST_DATABASE_URL: postgresql://q4_rescue:q4_rescue_dev@localhost:5432/q4_rescue_test
        run: python -m unittest discover -s tests -p 'test*.py' -q
