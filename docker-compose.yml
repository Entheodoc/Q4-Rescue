services:
  postgres:
    image: postgres:16
    container_name: q4-rescue-postgres
    environment:
      POSTGRES_DB: q4_rescue
      POSTGRES_USER: q4_rescue
      POSTGRES_PASSWORD: q4_rescue_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U q4_rescue -d q4_rescue"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
